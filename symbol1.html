<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mera Portfolio</title>
    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        html { scroll-behavior: smooth; }
        body { background-color: #f4f4f4; color: #333; line-height: 1.6; }

        
        nav {
            background: #222;
            color: white;
            padding: 15px;
            position: sticky;
            top: 0;
            text-align: center;
            z-index: 100;
        }
        nav a { color: white; margin: 0 10px; text-decoration: none; font-size: 14px; }

        
        section { padding: 50px 20px; text-align: center; }
        .hero { background: #007bff; color: white; padding: 80px 20px; }
        
        h2 { margin-bottom: 20px; border-bottom: 2px solid #007bff; display: inline-block; }

       
        .card {
            background: white;
            margin: 15px 0;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.3s; 
        }
        .card:hover { transform: translateY(-5px); }

        
        .btn {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        
        @media (max-width: 600px) {
            .hero h1 { font-size: 24px; }
            nav a { margin: 0 5px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="home">Home</a>
        <a href="about">About</a>
        <a href="projects">Projects</a>
        <a href="contact">Contact</a>
    </nav>

    <section id="home" class="hero">
        <h1>Hi, I'm Sara Rafiq </h1>
        <p>Web Developer & Designer</p>
        <a href="#contact" class="btn">Hire Me</a>
    </section>

    <section id="about">
        <h2>Skills</h2>
        <div class="card">HTML, CSS, JavaScript</div>
        <div class="card">React, Python, SQL</div>
    </section>

    <section id="projects">
        <h2>My Projects</h2>
        <div class="card">
            <h3>Project 1</h3>
            <p>Simple Website built with HTML/CSS.</p>
            <a href="#" class="btn">View Project</a>
        </div>
        <div class="card">
            <h3>Project 2</h3>
            <p>Mobile App UI Design.</p>
            <a href="#" class="btn">View Project</a>
        </div>
    </section>

    <section id="contact">
        <h2>Contact Me</h2>
        <form>
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Your Message" rows="4"></textarea>
            <button type="submit" class="btn" style="border:none; width:100%;">Send</button>
        </form>
    </section>

    <footer style="text-align:center; padding:20px; background:#222; color:white;">
        <p>© 2026My Portfolio</p>
    </footer>

</body>
</html>
